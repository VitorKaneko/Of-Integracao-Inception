<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inception Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div id="div-center">
        <img src="/svg/Image.svg" alt="Logo">
        <h2>INCEPTION</h2>
        <p>Plataforma de Impressão 3D e Modelagem</p>
        <form action="/login" method="POST">
            <input type="email" name="Email" id="input-login-name" class="input-login" placeholder="seu.email@exemplo.com">
            <input type="password" name="Senha" id="input-login-password" class="input-login" placeholder="suasenha123">

            <button type="submit">Entrar</button>
        </form>
    </div>
</body>
</html>
